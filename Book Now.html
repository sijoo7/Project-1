<!DOCTYPE html> 
<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<title>Kerala Tourism</title>
</head>
<body  bgcolor="#98afc7">
    <center><img src="Kerala Tourism main.jpeg"></center><br>
	<table bgcolor="bluegreen" width="100%" cellpadding="10" cellspacing="10" border="1">
   	 <thead>
    	<tr>
    		<th width="70%">
            	Kerala Tourism
            </th>
            <th width="30%">
                <a href="Contact us.html">Contact us</a>
            </th>
        </tr>
      </thead>
     </table> 
        <form>
        <center>
            <h3>Booking</h3>
    <table width="100%" border="2" cellpadding="15" cellspacing="15" bgcolor="#FFe6e6">
    <tbody>
        <tr>
        <td>
        	Name
            </td>  
         <td>
            <input type="text" name="name" size="20" />
        	</td>
        <td>
        	Phone no
            </td>
         <td> 
        	<input type="number" name="phone" size="20" />
            </td>
        	</tr>
        <tr>
        <td>
        	Email
            </td>
        <td> 
            <input type="email" name="email" size="20" />
        	</td>
        <td>
        	Available
            </td>
     	<td>       
             <input type="checkbox" name="avail" size="20" />Hotel<br />
             <input type="checkbox" name="avail" size="20" />Resort<br />
             <input type="checkbox" name="avail" size="20" />Homestay<br />
             <input type="checkbox" name="avail" size="20" />House Boat<br />
        	</td>
            </tr>
        <tr>
        <td>
        	Your Destination
            </td>
        <td>
        	<select >
            	<option>Select</option>
                <option>Alappuzha</option>
                <option>Athirappally</option>
                <option>Bekal</option>
                <option>Cherai Beach</option>
                <option>Fort Cochin</option>
                <option>Kovalam</option>
                <option>Kumarakom</option>
                <option>Kumbalangi</option>
                <option>Malampuzha</option>
                <option>Marayoor</option>
                <option>Munnar</option>
                <option>Silent valley</option>
                <option>Vagamon</option>
                <option>Varkala</option>
                <option>Wayanad</option>
             </select>
             </td>
        <td>
        	 No of Members
         	 </td>
        <td>
        	 <input type="number" name="members">
            </td>     
             </tr>
             <tr>
                <td>
                    Payment Method
                 </td>
                 
            
                 <td>
                    <input type="radio" name="payment" />Debit Card <br />
                    <input type="radio" name="payment" />Credit Card<br />
                    <input type="radio" name="payment" />UPI	
                </td>
                       <td> 
                           Card number 
                        </td>
                    <td>
                        <input type="text" name"cardnum" />
                    </td>    
                    
                   </tr>
                    
                   <tr>
                    <th>
                        Expiry Date
                    </th>
                    <th>
                        <select >
                        		<option>Month</option>
                        		<option>Jan</option>
                                <option>Feb</option>
                                <option>Mar</option>
                                <option>Apr</option>
                                <option>May</option>
                                <option>Jun</option>
                                <option>Jul</option>
                                <option>Aug</option>
                                <option>Sep</option>
                                <option>Oct</option>
                                <option>Nov</option>
                                <option>Dec</option>
                        </select>
                          <input type="text" name"day" placeholder="year"  size="2"/>
                           CVV  <input type="text" name"day"  size="2"/>
                        </th>
                        
                        <td> 
                        I hereby accept the terms and conditions
                         </td>
                     <td>
                         <input type="checkbox" name"agree" />Agree
                     </td>    
                    </tr>   
             </tbody>
             </table>
             <table>
        <tr> 
        <td>
      	   <button><a href=""><h5>Book Now</h5></a></button>
        	</td>		   
        </tbody>
    	</table>
</form>
